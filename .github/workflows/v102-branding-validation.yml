name: DraBornLife v1.0.2 Branding Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: drabornlife-v102-branding-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-branding:
    name: Build and verify icon plus animated splash
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g
      ANDROID_AVD_HOME: ${{ github.workspace }}/.android/avd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Enable emulator acceleration
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
          else
            echo "::warning::KVM unavailable; using software acceleration."
          fi

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies and reconstruct assets
        run: npm install

      - name: Verify branding assets
        run: |
          set -euo pipefail
          test -s assets/icon-v102.png
          test -s assets/splash-v102.jpg
          sha256sum assets/icon-v102.png assets/splash-v102.jpg | tee branding-assets.sha256
          file assets/icon-v102.png assets/splash-v102.jpg | tee branding-assets.txt
          test "$(sha256sum assets/icon-v102.png | cut -d' ' -f1)" = "2c615f590b52f26c7ffc71d663e9f7b2cfc065115a552b57505466db1a8abdd7"
          test "$(sha256sum assets/splash-v102.jpg | cut -d' ' -f1)" = "213e73f345cf10a71672752d797aa488cb5a28fa64cf3d473c795209fee8ec2c"

      - name: Validate Expo project
        run: npx expo-doctor 2>&1 | tee expo-doctor.log

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK
        working-directory: android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"

      - name: Prepare APK
        run: |
          set -euo pipefail
          mkdir -p dist smoke-test
          APK_PATH="$(find android/app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"
          test -n "$APK_PATH"
          cp "$APK_PATH" dist/DraBornLife-v1.0.2-branding-debug.apk
          sha256sum dist/DraBornLife-v1.0.2-branding-debug.apk > dist/DraBornLife-v1.0.2-branding-debug.apk.sha256

      - name: Create Android emulator
        run: |
          set -euo pipefail
          mkdir -p "$ANDROID_AVD_HOME"
          sdkmanager "emulator" "platform-tools" "system-images;android-30;google_apis;x86_64"
          echo no | avdmanager create avd --force --name drabornlife-v102-test --package "system-images;android-30;google_apis;x86_64"
          "$ANDROID_HOME/emulator/emulator" -list-avds | tee smoke-test/avd-list.txt
          grep -qx "drabornlife-v102-test" smoke-test/avd-list.txt

      - name: Verify animated splash and main screen
        run: |
          set -euo pipefail
          if [ -e /dev/kvm ]; then ACCEL="-accel on"; else ACCEL="-accel off"; fi

          nohup "$ANDROID_HOME/emulator/emulator" @drabornlife-v102-test \
            -no-window -noaudio -no-boot-anim -no-snapshot -wipe-data \
            -memory 2048 -cores 2 -gpu swiftshader_indirect -camera-back none \
            $ACCEL > smoke-test/emulator.log 2>&1 &
          EMULATOR_PID=$!

          timeout 240 adb wait-for-device
          BOOTED=""
          for attempt in $(seq 1 180); do
            BOOTED="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            [ "$BOOTED" = "1" ] && break
            kill -0 "$EMULATOR_PID" 2>/dev/null || { cat smoke-test/emulator.log; exit 1; }
            sleep 2
          done
          test "$BOOTED" = "1"

          adb install -r dist/DraBornLife-v1.0.2-branding-debug.apk
          adb logcat -c
          adb shell am force-stop com.draborneagle.drabornlife
          adb shell am start -W -n com.draborneagle.drabornlife/.MainActivity | tee smoke-test/activity-start.txt
          sleep 1
          adb exec-out screencap -p > smoke-test/animated-splash.png
          sleep 4
          adb exec-out screencap -p > smoke-test/main-screen.png
          adb logcat -d > smoke-test/logcat.txt

          APP_PID="$(adb shell pidof com.draborneagle.drabornlife | tr -d '\r')"
          test -n "$APP_PID"
          ! grep -E "FATAL EXCEPTION.*|Process: com.draborneagle.drabornlife" smoke-test/logcat.txt
          test -s smoke-test/animated-splash.png
          test -s smoke-test/main-screen.png
          echo "DraBornLife v1.0.2 stayed alive with PID $APP_PID"

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-v1.0.2-branding-validation
          path: |
            assets/icon-v102.png
            assets/splash-v102.jpg
            smoke-test/
            branding-assets.txt
            branding-assets.sha256
            expo-doctor.log
            gradle-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-v1.0.2-branding-debug-apk
          path: dist/
          if-no-files-found: warn
          retention-days: 14

      - name: Validation summary
        run: |
          {
            echo "## DraBornLife v1.0.2 Branding"
            echo "- Existing icon and splash assets verified"
            echo "- Android icon resources compiled"
            echo "- Animated splash and main screen captured"
            echo "- No fatal startup crash"
          } >> "$GITHUB_STEP_SUMMARY"
