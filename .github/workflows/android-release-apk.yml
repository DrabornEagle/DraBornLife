name: DraBornLife v1.0 Release APK

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: drabornlife-android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    name: Build signed Android release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Prepare release signing
        id: signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.DRABORNLIFE_KEYSTORE_BASE64 }}
          SECRET_STORE_PASSWORD: ${{ secrets.DRABORNLIFE_KEYSTORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.DRABORNLIFE_KEY_ALIAS }}
          SECRET_KEY_PASSWORD: ${{ secrets.DRABORNLIFE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/drabornlife-release.jks"
          RECOVERY_DIR="$GITHUB_WORKSPACE/signing-recovery"
          mkdir -p "$RECOVERY_DIR"

          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$SECRET_STORE_PASSWORD" ] && [ -n "$SECRET_KEY_ALIAS" ] && [ -n "$SECRET_KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            STORE_PASSWORD="$SECRET_STORE_PASSWORD"
            KEY_ALIAS="$SECRET_KEY_ALIAS"
            KEY_PASSWORD="$SECRET_KEY_PASSWORD"
            SIGNING_MODE="stable-secrets"
          else
            STORE_PASSWORD="$(openssl rand -hex 32)"
            KEY_PASSWORD="$STORE_PASSWORD"
            KEY_ALIAS="drabornlife"
            SIGNING_MODE="bootstrap-generated"

            echo "::add-mask::$STORE_PASSWORD"
            echo "::add-mask::$KEY_PASSWORD"

            keytool -genkeypair -v \
              -storetype JKS \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 4096 \
              -sigalg SHA256withRSA \
              -validity 10000 \
              -dname "CN=DraBornLife, OU=Mobile Release, O=DrabornEagle, L=Antalya, ST=Antalya, C=TR"

            cp "$KEYSTORE_PATH" "$RECOVERY_DIR/drabornlife-release.jks"
            printf '%s\n' \
              "DRABORNLIFE_KEYSTORE_PASSWORD=$STORE_PASSWORD" \
              "DRABORNLIFE_KEY_ALIAS=$KEY_ALIAS" \
              "DRABORNLIFE_KEY_PASSWORD=$KEY_PASSWORD" \
              > "$RECOVERY_DIR/credentials.env"

            openssl pkeyutl -encrypt \
              -pubin \
              -inkey .github/signing/recovery-public.pem \
              -in "$RECOVERY_DIR/credentials.env" \
              -out "$RECOVERY_DIR/credentials.env.enc" \
              -pkeyopt rsa_padding_mode:oaep \
              -pkeyopt rsa_oaep_md:sha256 \
              -pkeyopt rsa_mgf1_md:sha256
            rm -f "$RECOVERY_DIR/credentials.env"
          fi

          echo "DRABORNLIFE_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEYSTORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_SIGNING_MODE=$SIGNING_MODE" >> "$GITHUB_ENV"
          echo "mode=$SIGNING_MODE" >> "$GITHUB_OUTPUT"

      - name: Configure Gradle release signing
        run: node scripts/configure-android-release.js

      - name: Build signed release APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --info 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"

      - name: Upload Gradle diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-v1.0.0-gradle-log
          path: gradle-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload encrypted signing recovery bundle
        if: always() && steps.signing.outputs.mode == 'bootstrap-generated'
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-v1.0.0-signing-recovery
          path: signing-recovery/
          if-no-files-found: error
          retention-days: 30

      - name: Prepare release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          APK_PATH="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          test -n "$APK_PATH"
          cp "$APK_PATH" dist/DraBornLife-v1.0.0-release.apk
          sha256sum dist/DraBornLife-v1.0.0-release.apk > dist/DraBornLife-v1.0.0-release.apk.sha256
          keytool -list -v \
            -keystore "$DRABORNLIFE_KEYSTORE_PATH" \
            -storepass "$DRABORNLIFE_KEYSTORE_PASSWORD" \
            -alias "$DRABORNLIFE_KEY_ALIAS" > dist/DraBornLife-v1.0.0-certificate.txt

          if [ "$DRABORNLIFE_SIGNING_MODE" = "bootstrap-generated" ]; then
            cp dist/DraBornLife-v1.0.0-certificate.txt signing-recovery/certificate.txt
            sha256sum signing-recovery/drabornlife-release.jks > signing-recovery/drabornlife-release.jks.sha256
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-v1.0.0-release-apk
          path: |
            dist/DraBornLife-v1.0.0-release.apk
            dist/DraBornLife-v1.0.0-release.apk.sha256
            dist/DraBornLife-v1.0.0-certificate.txt
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        run: |
          {
            echo "## DraBornLife v1.0.0 Android Release"
            echo ""
            echo "- Package: com.draborneagle.drabornlife"
            echo "- Version: 1.0.0"
            echo "- Version code: 1"
            echo "- Signing mode: $DRABORNLIFE_SIGNING_MODE"
            echo "- Output: DraBornLife-v1.0.0-release.apk"
          } >> "$GITHUB_STEP_SUMMARY"
