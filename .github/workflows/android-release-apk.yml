name: DraBornLife Android Release APK

on:
  workflow_dispatch:
    inputs:
      run_smoke_test:
        description: Install and cold-start the APK on an Android emulator
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: drabornlife-android-release
  cancel-in-progress: true

jobs:
  build-release-apk:
    name: Build signed and tested Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g
      ANDROID_AVD_HOME: ${{ github.workspace }}/.android/avd

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read release metadata
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(node -p "require('./app.json').expo.version")"
          VERSION_CODE="$(node -p "require('./app.json').expo.android.versionCode")"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable emulator acceleration
        if: ${{ inputs.run_smoke_test }}
        shell: bash
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            ls -l /dev/kvm
          else
            echo "::warning::KVM is unavailable; emulator will use software acceleration."
          fi

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm install

      - name: Validate Expo project
        shell: bash
        run: |
          set -o pipefail
          npx expo-doctor 2>&1 | tee expo-doctor.log

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Load permanent DraBornLife signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.DRABORNLIFE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.DRABORNLIFE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.DRABORNLIFE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.DRABORNLIFE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Permanent DraBornLife signing secrets are missing. Add the four values from the v1.0.1 keystore backup package."
            exit 1
          fi

          echo "::add-mask::$STORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"
          echo "::add-mask::$KEY_ALIAS"

          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/drabornlife-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null

          echo "DRABORNLIFE_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEYSTORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Configure Gradle release signing
        run: node scripts/configure-android-release.js

      - name: Build signed release APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"

      - name: Prepare release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist smoke-test
          APK_PATH="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          test -n "$APK_PATH"
          OUTPUT="dist/DraBornLife-${APP_VERSION}-release.apk"
          cp "$APK_PATH" "$OUTPUT"
          sha256sum "$OUTPUT" > "${OUTPUT}.sha256"
          keytool -list -v \
            -keystore "$DRABORNLIFE_KEYSTORE_PATH" \
            -storepass "$DRABORNLIFE_KEYSTORE_PASSWORD" \
            -alias "$DRABORNLIFE_KEY_ALIAS" > "dist/DraBornLife-${APP_VERSION}-certificate.txt"

      - name: Install Android emulator image
        if: ${{ inputs.run_smoke_test }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ANDROID_AVD_HOME"
          sdkmanager "emulator" "platform-tools" "system-images;android-30;google_apis;x86_64"
          echo no | avdmanager create avd \
            --force \
            --name drabornlife-test \
            --package "system-images;android-30;google_apis;x86_64"
          "$ANDROID_HOME/emulator/emulator" -list-avds | tee smoke-test/avd-list.txt
          grep -qx "drabornlife-test" smoke-test/avd-list.txt

      - name: Cold-start test APK on Android emulator
        if: ${{ inputs.run_smoke_test }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -e /dev/kvm ]; then
            ACCEL="-accel on"
          else
            ACCEL="-accel off"
          fi

          nohup "$ANDROID_HOME/emulator/emulator" @drabornlife-test \
            -no-window \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -wipe-data \
            -memory 2048 \
            -cores 2 \
            -gpu swiftshader_indirect \
            -camera-back none \
            $ACCEL \
            > smoke-test/emulator.log 2>&1 &
          EMULATOR_PID=$!

          if ! timeout 240 adb wait-for-device; then
            cat smoke-test/emulator.log || true
            exit 1
          fi

          BOOTED=""
          for attempt in $(seq 1 180); do
            BOOTED="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            [ "$BOOTED" = "1" ] && break
            if ! kill -0 "$EMULATOR_PID" 2>/dev/null; then
              cat smoke-test/emulator.log || true
              exit 1
            fi
            sleep 2
          done
          [ "$BOOTED" = "1" ]

          adb install -r "dist/DraBornLife-${APP_VERSION}-release.apk"
          adb logcat -c
          adb shell am force-stop com.draborneagle.drabornlife
          adb shell am start -W -n com.draborneagle.drabornlife/.MainActivity | tee smoke-test/activity-start.txt
          sleep 20

          adb logcat -d > smoke-test/logcat.txt
          adb exec-out screencap -p > smoke-test/startup-screen.png
          APP_PID="$(adb shell pidof com.draborneagle.drabornlife | tr -d '\r')"

          if [ -z "$APP_PID" ]; then
            grep -E "FATAL EXCEPTION|AndroidRuntime|ReactNativeJS|com.draborneagle.drabornlife" smoke-test/logcat.txt | tail -n 250 || true
            exit 1
          fi

          if grep -E "FATAL EXCEPTION.*|Process: com.draborneagle.drabornlife" smoke-test/logcat.txt; then
            exit 1
          fi

          echo "DraBornLife stayed alive after startup with PID $APP_PID"

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-android-diagnostics
          path: |
            smoke-test/
            gradle-build.log
            expo-doctor.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-android-release-apk
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        run: |
          {
            echo "## DraBornLife Android Release"
            echo ""
            echo "- Package: com.draborneagle.drabornlife"
            echo "- Version: $APP_VERSION"
            echo "- Version code: $VERSION_CODE"
            echo "- Permanent signing key: verified"
            echo "- Emulator cold-start test requested: ${{ inputs.run_smoke_test }}"
          } >> "$GITHUB_STEP_SUMMARY"
