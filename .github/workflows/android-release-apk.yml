name: DraBornLife Android Release APK

on:
  workflow_dispatch:
    inputs:
      run_smoke_test:
        description: Install and cold-start the signed APK on an Android emulator
        required: true
        type: boolean
        default: true
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: drabornlife-android-release
  cancel-in-progress: true

jobs:
  build-release-apk:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.actor == github.repository_owner &&
       github.event.comment.body == 'DraBornLife APK Build')
    name: Build permanently signed and tested Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g
      ANDROID_AVD_HOME: ${{ github.workspace }}/.android/avd
      EXPECTED_CERT_SHA256: 60FFE546614C88E608AF1B543FA70665416B624AA511416CF4421AAAA69C8840
      RUN_SMOKE_TEST: ${{ github.event_name == 'issue_comment' || inputs.run_smoke_test }}

    steps:
      - name: Announce owner-command build
        if: ${{ github.event_name == 'issue_comment' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 DraBornLife Android Release APK başladı.\n\nRun ID: ${context.runId}`
            });

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Read release metadata
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(node -p "require('./app.json').expo.version")"
          VERSION_CODE="$(node -p "require('./app.json').expo.android.versionCode")"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable emulator acceleration
        if: ${{ env.RUN_SMOKE_TEST == 'true' }}
        shell: bash
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            ls -l /dev/kvm
          else
            echo "::warning::KVM is unavailable; emulator will use software acceleration."
          fi

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies and reconstruct assets
        run: npm install

      - name: Verify DraBornLife branding assets
        shell: bash
        run: |
          set -euo pipefail
          test -s assets/icon-v102.png
          test -s assets/splash-v102.jpg
          test -s assets/splash-v102.png
          test "$(sha256sum assets/icon-v102.png | cut -d' ' -f1)" = "2c615f590b52f26c7ffc71d663e9f7b2cfc065115a552b57505466db1a8abdd7"
          test "$(sha256sum assets/splash-v102.jpg | cut -d' ' -f1)" = "698f01c8cd8684ed42054c3b7bcbac1843bf195655aaca5a7dc49b6387f2652d"
          node -e "const fs=require('fs'); const b=fs.readFileSync('assets/splash-v102.png'); if(b.subarray(0,8).toString('hex')!=='89504e470d0a1a0a') process.exit(1);"

      - name: Validate Expo project
        shell: bash
        run: |
          set -o pipefail
          npx expo-doctor 2>&1 | tee expo-doctor.log

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Load configured DraBornLife signing key
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.DRABORNLIFE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.DRABORNLIFE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.DRABORNLIFE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.DRABORNLIFE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "SIGNING_STATUS=checking" >> "$GITHUB_ENV"

          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "SIGNING_STATUS=missing-signing-secrets" >> "$GITHUB_ENV"
            echo "::error::DraBornLife signing secrets are missing. Unsigned APK generation is forbidden."
            exit 1
          fi

          echo "::add-mask::$STORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"
          echo "::add-mask::$KEY_ALIAS"

          KEYSTORE_PATH="$GITHUB_WORKSPACE/android/app/drabornlife-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          keytool -list -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" > signing-key-certificate.txt

          KEY_CERT_SHA256="$(awk -F': ' '/SHA256:/{gsub(":", "", $2); gsub(/[[:space:]]/, "", $2); print toupper($2); exit}' signing-key-certificate.txt)"
          if [ -z "$KEY_CERT_SHA256" ]; then
            echo "SIGNING_STATUS=certificate-fingerprint-unreadable" >> "$GITHUB_ENV"
            exit 1
          fi

          if [ "$KEY_CERT_SHA256" != "$EXPECTED_CERT_SHA256" ]; then
            echo "SIGNING_STATUS=wrong-current-certificate" >> "$GITHUB_ENV"
            echo "::error::The configured key is not the current DraBornLife signing certificate."
            exit 1
          fi

          echo "LOADED_CERT_SHA256=$KEY_CERT_SHA256" >> "$GITHUB_ENV"
          echo "SIGNING_STATUS=signing-key-loaded" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEYSTORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "DRABORNLIFE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Configure Gradle release signing
        run: node scripts/configure-android-release.js

      - name: Build signed release APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"

      - name: Verify APK signature and prepare release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist smoke-test
          APK_PATH="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          test -n "$APK_PATH"

          OUTPUT="dist/DraBornLife-v${APP_VERSION}-signed-release.apk"
          SIGNATURE_REPORT="dist/DraBornLife-v${APP_VERSION}-signature.txt"
          CERTIFICATE_REPORT="dist/DraBornLife-v${APP_VERSION}-certificate.txt"
          cp "$APK_PATH" "$OUTPUT"
          cp signing-key-certificate.txt "$CERTIFICATE_REPORT"

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$OUTPUT" | tee "$SIGNATURE_REPORT"

          APK_CERT_SHA256="$(awk -F': ' '/certificate SHA-256 digest:/{gsub(/[[:space:]]/, "", $2); print toupper($2); exit}' "$SIGNATURE_REPORT")"
          if [ -z "$APK_CERT_SHA256" ]; then
            echo "::error::APK certificate fingerprint could not be read from apksigner output."
            exit 1
          fi

          if [ "$APK_CERT_SHA256" != "$LOADED_CERT_SHA256" ] || [ "$APK_CERT_SHA256" != "$EXPECTED_CERT_SHA256" ]; then
            echo "::error::Built APK does not match the current DraBornLife signing certificate."
            exit 1
          fi

          echo "SIGNING_STATUS=current-certificate-verified" >> "$GITHUB_ENV"
          sha256sum "$OUTPUT" > "${OUTPUT}.sha256"

      - name: Upload permanently signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-android-release-apk
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Install Android emulator image
        if: ${{ env.RUN_SMOKE_TEST == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ANDROID_AVD_HOME"
          sdkmanager "emulator" "platform-tools" "system-images;android-30;google_apis;x86_64"
          echo no | avdmanager create avd \
            --force \
            --name drabornlife-test \
            --package "system-images;android-30;google_apis;x86_64"
          "$ANDROID_HOME/emulator/emulator" -list-avds | tee smoke-test/avd-list.txt
          grep -qx "drabornlife-test" smoke-test/avd-list.txt

      - name: Cold-start signed APK on Android emulator
        if: ${{ env.RUN_SMOKE_TEST == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -e /dev/kvm ]; then
            ACCEL="-accel on"
          else
            ACCEL="-accel off"
          fi

          nohup "$ANDROID_HOME/emulator/emulator" @drabornlife-test \
            -no-window \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -wipe-data \
            -memory 2048 \
            -cores 2 \
            -gpu swiftshader_indirect \
            -camera-back none \
            $ACCEL \
            > smoke-test/emulator.log 2>&1 &
          EMULATOR_PID=$!

          timeout 240 adb wait-for-device

          BOOTED=""
          for attempt in $(seq 1 180); do
            BOOTED="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            [ "$BOOTED" = "1" ] && break
            if ! kill -0 "$EMULATOR_PID" 2>/dev/null; then
              cat smoke-test/emulator.log || true
              exit 1
            fi
            sleep 2
          done
          [ "$BOOTED" = "1" ]

          adb install -r "dist/DraBornLife-v${APP_VERSION}-signed-release.apk"
          adb logcat -c
          adb shell am force-stop com.draborneagle.drabornlife
          adb shell am start -W -n com.draborneagle.drabornlife/.MainActivity | tee smoke-test/activity-start.txt
          sleep 20

          adb logcat -d > smoke-test/logcat.txt
          adb exec-out screencap -p > smoke-test/startup-screen.png
          APP_PID="$(adb shell pidof com.draborneagle.drabornlife | tr -d '\r')"

          if [ -z "$APP_PID" ]; then
            grep -E "FATAL EXCEPTION|AndroidRuntime|ReactNativeJS|com.draborneagle.drabornlife" smoke-test/logcat.txt | tail -n 250 || true
            exit 1
          fi

          if grep -E "FATAL EXCEPTION.*|Process: com.draborneagle.drabornlife" smoke-test/logcat.txt; then
            exit 1
          fi

          echo "DraBornLife stayed alive after startup with PID $APP_PID"

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DraBornLife-android-diagnostics
          path: |
            smoke-test/
            gradle-build.log
            expo-doctor.log
            signing-key-certificate.txt
            dist/*-certificate.txt
            dist/*-signature.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Build summary
        if: always()
        run: |
          {
            echo "## DraBornLife Android Release APK"
            echo ""
            echo "- Package: com.draborneagle.drabornlife"
            echo "- Version: ${APP_VERSION:-unknown}"
            echo "- Version code: ${VERSION_CODE:-unknown}"
            echo "- Signing status: ${SIGNING_STATUS:-not-reached}"
            echo "- Expected certificate: $EXPECTED_CERT_SHA256"
            echo "- Output: DraBornLife-v${APP_VERSION:-unknown}-signed-release.apk"
            echo "- Emulator cold-start test: $RUN_SMOKE_TEST"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report owner-command result
        if: ${{ always() && github.event_name == 'issue_comment' }}
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          APP_VERSION: ${{ env.APP_VERSION }}
          SIGNING_STATUS: ${{ env.SIGNING_STATUS }}
        with:
          script: |
            const success = process.env.JOB_STATUS === 'success';
            const body = success
              ? `✅ DraBornLife v${process.env.APP_VERSION} imzalandı, test edildi ve APK hazır.\n\nRun ID: ${context.runId}\nArtifact: DraBornLife-android-release-apk\nSigning: ${process.env.SIGNING_STATUS}`
              : `❌ DraBornLife Android Release APK çalışması başarısız oldu.\n\nRun ID: ${context.runId}\nSigning: ${process.env.SIGNING_STATUS || 'not-reached'}\nNot: İmza doğrulandıysa APK artifact emülatör testinden önce yüklenmiş olabilir.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
